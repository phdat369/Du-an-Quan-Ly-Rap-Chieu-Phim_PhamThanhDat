<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/landing_page.css">
</head>
<body>
    <header id="header">
        <div class="container_1">
            <img src="../assets/icons/icon_movie.png" alt="" id="icon_movie">
            <div class="name_web">
                <span id="name_1">Rikkei </span>
                <span id="name_2">Cinema</span>
            </div>
        </div>
        <div class="container_2">
            <div class="taskbar">
                <a href="" class="link_pages">Trang Chủ</a>
                <a href="" class="link_pages">Phim</a>
                <a href="" class="link_pages">Rạp chiếu</a>
            </div>
            <div class="button_gotologin">
                <button id="btn_login">Đăng Nhập / Đăng Ký</button>
            </div>
        </div>
    </header>
    <main>
        <div class="first_page">
            <div id="background">
                <img src="../assets/images/picture_2.png" alt="">
                <div id="note">
                    <div id="status">
                        <img src="../assets/icons/icon_record.png" alt="">
                        <p>Đang Thịnh Hành</p>
                    </div>
                    <h1>Dune: Hành Tinh Cát</h1>
                    <h3>Câu chuyện về cuộc sống hành trình của Pau Atreides, một chàng trai trẻ tài năng và rực rỡ, sinh ra với số phận vĩ đại vượt quá sự hiểu biết của mình.</h3>
                    <div id="information_film">
                        <div id="book_film">
                            <button class="book_film">
                                <img src="../assets/icons/icon_ticket.png" alt="">
                                <p>Đặt Vé Ngay</p>
                            </button>
                        </div>
                        <div id="trailer_film">
                            <button class="trailer">
                                <img src="../assets/icons/icon_continue.png" alt="">
                                <p>Xem Trailer</p>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="body_page1">
            <div class="active_film">
                <p>Phim Đang Chiếu</p>
                <div id="see_all">
                    <p>Xem tất cả</p>
                    <img src="../assets/icons/icon_arow_red.png" alt="">
                </div>
            </div>
            <div class="main_movie">
                <div class="film">
                    <img src="../assets/images/picture_3.png" alt="">
                </div>
                <div class="film">
                    <img src="../assets/images/picture_4.png" alt="">
                </div>
                <div class="film">
                    <img src="../assets/images/picture_8.png" alt="">
                </div>
                <div class="film">
                    <img src="../assets/images/picture_9.png" alt="">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
