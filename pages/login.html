<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="header">
        <div class="container_1">
            <img src="../assets/icons/icon_movie.png" alt="" id="icon_movie">
            <div class="name_web">
                <span id="name_1">Rikkei </span>
                <span id="name_2">Cinema</span>
            </div>
        </div>
        <div class="container_2">
            <div class="taskbar">
                <a href="../pages/landing_page.html" class="link_pages">Trang Chủ</a>
                <a href="" class="link_pages">Thông Tin</a>
                <a href="" class="link_pages">Liên Hệ</a>
            </div>
            <div class="button_gotologin">
                <button id="btn_login">Đăng Nhập</button>
            </div>
        </div>
    </header>
    <main>
        <div id="form_login">
            <div id="background_form_login">
                <img src="../assets/images/picture_6.png" alt="">
            </div>
            <div id="input_login">
                <div id="title">
                    <h1>Chào mừng quay trở lại</h1>
                </div>
                <div id="login_email">
                    <label for="email">Email</label>
                    <input type="email" name="Email" id="email" placeholder="Nhập email của bạn">
                    <img src="../assets/icons/icon_email.png" alt="">
                    <p id="notificationEmailError"></p>
                </div>
                <div id="login_password">
                    <label for="password">Mật khẩu</label>
                    <input type="password" name="Mật khẩu" id="password" placeholder="Nhập mật khẩu của bạn">
                    <img src="../assets/icons/icon_password.png" alt="">
                    <p id="notificationPasswordError"></p>
                </div>
                <div id="status">
                    <input type="checkbox" id="save_login">
                    <label for="save_login">Ghi nhớ đăng nhập</label>
                    <a href="">Quên mật khẩu?</a>
                </div>
                <div id="btn_submit_login">
                    <button id="btn_login_confirm">Đăng nhập <img src="../assets/icons/icon_login.png" alt=""></button>
                </div>
                <div id="no_account">
                    <p>Bạn chưa có tài khoản?</p>
                    <a href="./register.html" id="to_register">Đăng ký ngay</a>
                </div>
            </div>
        </div>
        <div id="toast"></div>
    </main>
    <script src="../js/login.js"></script>
</body>
</html>
