<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header id="header">
        <div class="container_1">
            <img src="../assets/icons/icon_movie.png" alt="" id="icon_movie">
            <div class="name_web">
                <span id="name_1">Rikkei </span>
                <span id="name_2">Cinema</span>
            </div>
        </div>
        <div class="container_2">
            <div class="taskbar">
                <a href="" class="link_pages">Trang Chủ</a>
                <a href="" class="link_pages">Thông Tin</a>
                <a href="" class="link_pages">Liên Hệ</a>
            </div>
            <div class="button_gotologin">
                <button id="btn_login">Đăng Nhập</button>
            </div>
        </div>
    </header>
    <main>
        <div class="background">
            <img src="../assets/images/picture_5.png" alt="" id="img">
            <div class="form_register">
                <div id="title">
                    <h1>Tạo tài khoản mới</h1>
                </div>
                <div id="note">
                    <h3>Đăng ký để đặt vé phim ngay hôm nay</h3>
                </div>
                <div class="input_register">
                    <div class="input">
                        <label for="name">Họ và tên</label>
                        <input type="text" name="Họ và tên" id="name" placeholder="Nguyễn Văn A">
                        <p id="notificationNameError"></p>
                    </div>
                    <div class="input">
                        <label for="email">Email</label>
                        <input type="email" name="Email" id="email" placeholder="email@example.com">
                        <p id="notificationEmailError"></p>
                    </div>
                    <div class="input" id="input_1">
                        <label for="password">Mật khẩu</label>
                        <input type="password" name="Mật khẩu" id="password">
                        <img src="../assets/icons/icon_hide.png" alt="" id="icon_1">
                        <p id="notificationPasswordError"></p>
                    </div>
                    <div class="input" id="input_2">
                        <label for="re_password">Xác nhận mật khẩu</label>
                        <input type="password" name="Xác nhận mật khẩu" id="re_password">
                        <img src="../assets/icons/icon_hide.png" alt="" id="icon_2">
                        <p id="notificationRePasswordError"></p>
                    </div>
                    <div id="confirm">
                        <input type="checkbox" name="" id="check">
                        <label for="check" id="commit"><span>Tôi đồng ý với <a href="">điều khoản sử dụng</a> và chính sách bảo mật
                                của CineEdu.</span></label>
                        <p id="notificationCheckBoxError"></p>
                    </div>
                    <button id="btn_register">Đăng ký <img src="../assets/icons/icon_arrow.png" alt=""></button>
                </div>
                <div class="had_account">
                    <p>Đã có tài khoản?</p>
                    <a href="./login.html">Đăng nhập ngay</a>
                </div>
                <div class="footer">
                    <p>&copy; 2026 RikkeiEdu. Tất cả quyền được bảo mật .</p>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/register.js"></script>
</body>

</html>
